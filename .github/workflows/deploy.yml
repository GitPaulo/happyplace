name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # Weekly Monday 4 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch FR data
        run: npx tsx scripts/fetch-fr.ts
        continue-on-error: true

      - name: Fetch GB data
        run: npx tsx scripts/fetch-gb.ts
        continue-on-error: true

      - name: Fetch DE data
        run: npx tsx scripts/fetch-de.ts
        continue-on-error: true

      - name: Verify data files exist
        run: |
          echo "=== Data files ==="
          find packages/frontend/public/data -type f -name '*.json' | sort
          echo "=== Sizes ==="
          du -sh packages/frontend/public/data/*/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: static-data
          path: packages/frontend/public/data/
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: fetch-data
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: static-data
          path: packages/frontend/public/data/

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Build frontend
        run: npm run build -w packages/frontend

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
