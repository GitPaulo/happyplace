name: Refresh Static Data

on:
  schedule:
    - cron: "0 4 * * 1" # Weekly Monday 4 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch ${{ matrix.country }} data
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - country: FR
            script: scripts/fetch-fr.ts
            data_dir: fr
            artifact: data-fr
          - country: GB
            script: scripts/fetch-gb.ts
            data_dir: gb
            artifact: data-gb
          - country: DE
            script: scripts/fetch-de.ts
            data_dir: de
            artifact: data-de
          - country: US
            script: scripts/fetch-us.ts
            data_dir: us
            artifact: data-us
          - country: CA
            script: scripts/fetch-ca.ts
            data_dir: ca
            artifact: data-ca

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch ${{ matrix.country }} data
        run: npx tsx ${{ matrix.script }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          FBI_API_KEY: ${{ secrets.FBI_API_KEY }}

      - name: Package ${{ matrix.country }} data
        if: ${{ always() }}
        run: |
          if [ -d "packages/frontend/public/data/${{ matrix.data_dir }}" ]; then
            tar -cf "${{ matrix.artifact }}.tar" "packages/frontend/public/data/${{ matrix.data_dir }}"
          else
            echo "No data directory found for ${{ matrix.country }}"
          fi

      - name: Upload ${{ matrix.country }} data
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar
          if-no-files-found: ignore
          compression-level: 0

  merge_and_commit:
    name: Merge and commit updated data
    runs-on: ubuntu-latest
    needs: fetch
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v6

      - name: Download generated data
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: data-*
          merge-multiple: true

      - name: Extract generated data
        run: |
          find artifacts -type f -name 'data-*.tar' -print -exec tar -xf {} \;

      - name: Summary
        run: |
          echo "=== Data files ==="
          find packages/frontend/public/data -type f -name '*.json' | sort
          echo "=== Sizes ==="
          du -sh packages/frontend/public/data/*/

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add packages/frontend/public/data/

          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi

          git commit -m "chore: refresh static data"
          git push origin "HEAD:${GITHUB_REF_NAME}"
